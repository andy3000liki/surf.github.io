<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Menu with Theme Toggle</title>
<link href="[https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap](https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap)" rel="stylesheet">
<style>
:root {
--md-sys-color-background: #FDFBFF;
--md-sys-color-on-background: #1A1C1E;
--md-sys-color-surface: #FEF7FF;
--md-sys-color-on-surface: #1D1B20;
--md-sys-color-primary: #6750A4;
--md-sys-color-primary-container: #EADDFF;
--md-sys-color-on-primary-container: #21005D;
--md-sys-color-outline: #79747E;
}
.dark-theme {
--md-sys-color-background: #1A1C1E;
--md-sys-color-on-background: #E2E2E5;
--md-sys-color-surface: #1C1B1F;
--md-sys-color-on-surface: #E6E1E5;
--md-sys-color-primary: #D0BCFF;
--md-sys-color-primary-container: #4F378B;
--md-sys-color-on-primary-container: #EADDFF;
--md-sys-color-outline: #938F99;
}
body {
font-family: 'Roboto', sans-serif;
background-color: var(--md-sys-color-background);
color: var(--md-sys-color-on-background);
margin: 0;
padding: 20px;
display: flex;
flex-direction: column;
align-items: center;
transition: background-color 0.3s, color 0.3s;
}
.header-actions {
width: 100%;
max-width: 600px;
display: flex;
justify-content: flex-end;
margin-bottom: 20px;
}
.theme-toggle-btn {
background-color: var(--md-sys-color-primary-container);
color: var(--md-sys-color-on-primary-container);
border: none;
border-radius: 50%;
width: 48px;
height: 48px;
display: flex;
justify-content: center;
align-items: center;
cursor: pointer;
box-shadow: 0px 2px 6px rgba(0, 0, 0, 0.15);
transition: background-color 0.3s, color 0.3s;
}
.theme-toggle-btn svg {
width: 24px;
height: 24px;
fill: currentColor;
}
.menu-container {
background-color: var(--md-sys-color-surface);
color: var(--md-sys-color-on-surface);
max-width: 600px;
width: 100%;
border-radius: 24px;
padding: 40px;
box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.1);
transition: background-color 0.3s, color 0.3s;
box-sizing: border-box;
}
h1 {
text-align: center;
color: var(--md-sys-color-primary);
font-size: 2.5rem;
margin-top: 0;
margin-bottom: 30px;
}
h2 {
color: var(--md-sys-color-on-surface);
font-size: 1.5rem;
border-bottom: 2px solid var(--md-sys-color-primary-container);
padding-bottom: 8px;
margin-top: 30px;
margin-bottom: 16px;
}
.menu-item {
display: flex;
justify-content: space-between;
margin-bottom: 12px;
font-size: 1.1rem;
}
.item-name {
font-weight: 500;
}
.item-price {
font-weight: 700;
}
#sun-icon {
display: none;
}
</style>
</head>
<body>
<div class="header-actions">
<button class="theme-toggle-btn" id="theme-toggle" aria-label="Toggle Theme">
<svg id="moon-icon" xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)" viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
<svg id="sun-icon" xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)" viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41.39.39 1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41.39.39 1.03.39 1.41 0l1.06-1.06z"/></svg>
</button>
</div>
<div class="menu-container">
<h1>Menu</h1>
<h2>Burgers</h2>
<div class="menu-item">
<span class="item-name">Classic Hamburger</span>
<span class="item-price">$5.99</span>
</div>
<div class="menu-item">
<span class="item-name">Cheeseburger</span>
<span class="item-price">$6.99</span>
</div>
<div class="menu-item">
<span class="item-name">Double Bacon Cheeseburger</span>
<span class="item-price">$8.99</span>
</div>
<h2>Sides</h2>
<div class="menu-item">
<span class="item-name">French Fries</span>
<span class="item-price">$2.99</span>
</div>
<div class="menu-item">
<span class="item-name">Onion Rings</span>
<span class="item-price">$3.99</span>
</div>
<h2>Drinks</h2>
<div class="menu-item">
<span class="item-name">Fountain Soda</span>
<span class="item-price">$1.99</span>
</div>
<div class="menu-item">
<span class="item-name">Iced Tea</span>
<span class="item-price">$2.49</span>
</div>
</div>
<script>
const themeToggle = document.getElementById('theme-toggle');
const body = document.body;
const sunIcon = document.getElementById('sun-icon');
const moonIcon = document.getElementById('moon-icon');
themeToggle.addEventListener('click', () => {
body.classList.toggle('dark-theme');
if (body.classList.contains('dark-theme')) {
sunIcon.style.display = 'block';
moonIcon.style.display = 'none';
} else {
sunIcon.style.display = 'none';
moonIcon.style.display = 'block';
}
});
</script>
</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Example</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@500&display=swap" rel="stylesheet">
    <style>
        /* Material Design 3 Filled Button Styles */
        .md-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #6750A4; /* Primary Color */
            color: #FFFFFF; /* On Primary */
            font-family: 'Roboto', sans-serif;
            font-weight: 500;
            font-size: 0.875rem; /* 14px */
            letter-spacing: 0.1px;
            text-decoration: none;
            height: 40px;
            padding: 0 24px;
            border-radius: 20px; /* Fully rounded corners */
            border: none;
            cursor: pointer;
            transition: background-color 0.3s, box-shadow 0.3s;
            box-shadow: 0px 1px 3px rgba(0, 0, 0, 0.1);
        }

        .md-button:hover {
            background-color: #7A61BA; /* Slightly lighter on hover */
            box-shadow: 0px 2px 6px rgba(0, 0, 0, 0.2);
        }

        .md-button:active {
            background-color: #554188; /* Darker on click */
        }
    </style>
</head>
<body>

    <a href="race.html" class="md-button">Go to Race Page</a>

</body>
</html>
