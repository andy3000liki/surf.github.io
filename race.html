<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Racing Game</title>
    <style>
        body {
            background-color: #2c3e50;
            color: #ecf0f1;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
        }

        #gameCanvas {
            background-color: #34495e;
            border: 4px solid #bdc3c7;
            border-radius: 8px;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.5);
        }

        .stats {
            display: flex;
            justify-content: space-between;
            width: 400px;
            margin-bottom: 10px;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .controls-info {
            margin-top: 15px;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <div class="stats">
        <span>Score: <span id="scoreDisplay">0</span></span>
    </div>

    <canvas id="gameCanvas" width="400" height="500"></canvas>
    
    <div class="controls-info">
        Use <strong>Left</strong> and <strong>Right</strong> arrow keys to move. Refresh to restart.
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("scoreDisplay");

        // Game Variables
        let score = 0;
        let gameSpeed = 3;
        let isGameOver = false;
        let animationId;

        // Player Car
        const player = {
            x: 175,
            y: 400,
            width: 50,
            height: 80,
            speed: 5,
            dx: 0
        };

        // Obstacles Array
        const obstacles = [];

        // Input Listening
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') player.dx = -player.speed;
            if (e.key === 'ArrowRight') player.dx = player.speed;
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') player.dx = 0;
        });

        // Add new obstacles periodically
        function spawnObstacle() {
            // Random x position keeping the obstacle fully inside the canvas
            const randomX = Math.random() * (canvas.width - 50);
            obstacles.push({
                x: randomX,
                y: -80,
                width: 50,
                height: 80
            });
        }

        // Main game loop
        function update() {
            if (isGameOver) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "30px sans-serif";
                ctx.fillText("GAME OVER", 110, 250);
                return;
            }

            // Clear previous frame
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Move and draw player
            player.x += player.dx;
            
            // Wall collision for player (prevent going out of bounds)
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

            ctx.fillStyle = "#3498db"; // Blue player car
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // Handle obstacles
            for (let i = 0; i < obstacles.length; i++) {
                let obs = obstacles[i];
                obs.y += gameSpeed;

                // Draw obstacle
                ctx.fillStyle = "#e74c3c"; // Red enemy car
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);

                // Collision Detection (AABB)
                if (player.x < obs.x + obs.width &&
                    player.x + player.width > obs.x &&
                    player.y < obs.y + obs.height &&
                    player.y + player.height > obs.y) {
                    isGameOver = true;
                }

                // Remove off-screen obstacles and increase score
                if (obs.y > canvas.height) {
                    obstacles.splice(i, 1);
                    score++;
                    scoreDisplay.innerText = score;
                    i--; // Adjust index after removal
                    
                    // Slightly increase speed as game progresses
                    if (score % 5 === 0) {
                        gameSpeed += 0.5;
                    }
                }
            }

            // Spawn rate control (spawn roughly every 60 frames)
            if (Math.random() < 0.02) {
                spawnObstacle();
            }

            // Request next frame
            animationId = requestAnimationFrame(update);
        }

        // Start the game
        update();
    </script>
</body>
</html>
